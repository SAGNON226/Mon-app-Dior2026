<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIOR FASHION - Authentification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #d4af37; --dark: #000; --grey: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark); color: white; overflow-x: hidden; }
        
        /* --- STYLE EXTÉRIEUR (LOGIN/SIGNUP) --- */
        #auth-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .logo-dior { font-size: 50px; letter-spacing: 15px; margin-bottom: 40px; font-weight: 300; }
        .auth-container { background: var(--grey); padding: 30px; border-radius: 5px; width: 100%; max-width: 350px; border: 1px solid #333; }
        .auth-tabs { display: flex; justify-content: space-around; margin-bottom: 30px; }
        .tab { color: #888; cursor: pointer; padding-bottom: 5px; }
        .tab.active { color: white; border-bottom: 2px solid var(--gold); }
        .input-group { margin-bottom: 15px; }
        select, input { width: 100%; background: none; border: none; border-bottom: 1px solid #555; color: white; padding: 10px 0; outline: none; }
        .btn-action { width: 100%; background: none; border: 1px solid var(--gold); color: var(--gold); padding: 12px; margin-top: 20px; cursor: pointer; transition: 0.3s; }
        .btn-action:hover { background: var(--gold); color: black; }
        
        /* --- STYLE INTÉRIEUR (DASHBOARD) --- */
        #main-app { display: none; padding-bottom: 80px; }
        .banner { width: 100%; height: 160px; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1548036328-c9fa89d128fa?q=80&w=1000&auto=format&fit=crop'); background-size: cover; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: var(--gold); border-bottom: 2px solid var(--gold); }
        .quick-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; text-align: center; background: #1e1e1e; margin: -20px 15px 20px 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .action-item i { font-size: 20px; color: var(--gold); display: block; margin-bottom: 5px; }
        .action-item span { font-size: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; }
        .stat-card { background: #1e1e1e; padding: 15px 5px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #1e1e1e; display: grid; grid-template-columns: repeat(4, 1fr); padding: 12px 0; border-top: 1px solid #333; text-align: center; }
        .nav-item { color: #888; font-size: 11px; cursor: pointer; }
        .nav-item i { display: block; font-size: 18px; margin-bottom: 3px; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="logo-dior">DIOR</div>
        <div class="auth-container">
            <div class="auth-tabs">
                <span id="tab-login" class="tab" onclick="switchTab('login')">Connexion</span>
                <span id="tab-register" class="tab active" onclick="switchTab('register')">Inscription</span>
            </div>
            
            <div class="input-group">
                <select id="pays">
                    <option value="+226">Burkina Faso (+226)</option>
                    <option value="+229">Bénin (+229)</option>
                </select>
            </div>
            <div class="input-group">
                <input type="number" id="auth-numero" placeholder="Numéro">
            </div>
            <div class="input-group">
                <input type="password" id="auth-code" placeholder="Code secret (PIN)">
            </div>
            <div class="input-group" id="group-parrainage">
                <input type="text" id="auth-parrain" placeholder="Code parrainage (optionnel)">
            </div>
            
            <button id="auth-btn" class="btn-action" onclick="handleAuth()">Créer</button>
        </div>
    </div>

    <div id="main-app">
        <div class="banner">DIOR FASHION</div>
        <div class="quick-actions">
            <div class="action-item"><i class="fas fa-wallet"></i><span>Recharger</span></div>
            <div class="action-item"><i class="fas fa-hand-holding-usd"></i><span>Retirer</span></div>
            <div class="action-item"><i class="fas fa-headset"></i><span>Service</span></div>
            <div class="action-item"><i class="fas fa-gift"></i><span>Cadeau</span></div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><b id="display-solde">0 F</b><br><small>Solde</small></div>
            <div class="stat-card"><b>0 F</b><br><small>Aujourd'hui</small></div>
            <div class="stat-card"><b>0 F</b><br><small>Total</small></div>
        </div>
        
        <nav class="nav-bottom">
            <div class="nav-item active"><i class="fas fa-home"></i>ACCUEIL</div>
            <div class="nav-item"><i class="fas fa-chart-line"></i>INVESTIR</div>
            <div class="nav-item"><i class="fas fa-users"></i>ÉQUIPE</div>
            <div class="nav-item"><i class="fas fa-user"></i>COMPTE</div>
        </nav>
    </div>

    <script>
        // CONFIGURATION SUPABASE
        const supabaseUrl = "https://ciamfmmmznshnmmtxntf.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpYW1mbW1tem5zaG5tbXR4bnRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDYwNjgsImV4cCI6MjA5MTIyMjA2OH0.er_YZ2Mg-fwwXLPkS20eli1hO8eCfd8DReOferSBw3M"; 
        
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        
        let isLogin = false;

        function switchTab(type) {
            isLogin = (type === 'login');
            document.getElementById('tab-login').className = isLogin ? 'tab active' : 'tab';
            document.getElementById('tab-register').className = isLogin ? 'tab' : 'tab active';
            document.getElementById('group-parrainage').style.display = isLogin ? 'none' : 'block';
            document.getElementById('auth-btn').innerText = isLogin ? 'Se connecter' : 'Créer';
        }

        async function handleAuth() {
            const pays = document.getElementById('pays').value;
            const num = document.getElementById('auth-numero').value;
            const pin = document.getElementById('auth-code').value;
            const fullNum = pays + num;

            if(!num || !pin) return alert("Veuillez remplir tous les champs");

            if(!isLogin) {
                // LOGIQUE INSCRIPTION
                const { data, error } = await _supabase
                    .from('utilisateurs')
                    .insert([{ numero: fullNum, pin: pin, solde: 500 }]);

                if (error) {
                    if(error.message.includes("unique")) alert("Ce numéro est déjà utilisé.");
                    else alert("Erreur : " + error.message);
                } else {
                    alert("Compte créé ! Bonus de 500 F offert.");
                    enterApp(500);
                }
            } else {
                // LOGIQUE CONNEXION
                const { data, error } = await _supabase
                    .from('utilisateurs')
                    .select('*')
                    .eq('numero', fullNum)
                    .eq('pin', pin)
                    .single();

                if (error || !data) {
                    alert("Numéro ou code PIN incorrect.");
                } else {
                    enterApp(data.solde);
                }
            }
        }

        function enterApp(solde) {
            document.getElementById('display-solde').innerText = solde + " F";
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        }
    </script>
</body>
</html>
