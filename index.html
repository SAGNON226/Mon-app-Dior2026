<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dior2026 - Plateforme Officielle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dior-orange: #e88e0c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fdfdfd; margin: 0; }
        .page { display: none; padding-bottom: 100px; animation: fadeIn 0.3s ease-out; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #loader {
            display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9);
            z-index: 10000; justify-content: center; align-items: center; flex-direction: column;
        }
        .disabled-btn { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
    </style>
</head>
<body>

<div id="loader">
    <div class="w-12 h-12 border-4 border-black border-t-orange-500 rounded-full animate-spin mb-4"></div>
    <p class="font-black text-xs uppercase tracking-widest">Dior2026</p>
</div>

<div class="max-w-md mx-auto min-h-screen shadow-2xl relative bg-white">

    <div id="register-page" class="page active px-8 pt-20">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black italic tracking-tighter text-zinc-900">DIOR<span class="text-orange-500">2026</span></h1>
            <p class="text-[10px] uppercase tracking-[0.4em] mt-3 font-bold text-gray-400">Créer un compte</p>
        </div>
        <div class="space-y-5">
            <div class="bg-gray-50 rounded-3xl p-5 border border-gray-100 flex items-center">
                <span class="font-bold text-gray-400 mr-4 border-r pr-4">+226</span>
                <input id="reg-phone" type="tel" placeholder="Numéro de téléphone" class="bg-transparent outline-none flex-1 font-bold">
            </div>
            <div class="bg-gray-50 rounded-3xl p-5 border border-gray-100 flex items-center">
                <i class="fas fa-lock text-gray-300 mr-4"></i>
                <input id="reg-pass" type="password" placeholder="Mot de passe" class="bg-transparent outline-none flex-1 font-bold">
            </div>
            <div class="bg-orange-50 rounded-3xl p-5 border border-orange-100 flex items-center">
                <i class="fas fa-ticket-alt text-orange-400 mr-4"></i>
                <input id="reg-invite" type="text" value="3vo902" class="bg-transparent outline-none flex-1 font-black text-orange-600">
            </div>
            <button onclick="handleAuth('register')" class="w-full bg-zinc-900 text-white py-6 rounded-3xl font-black text-lg shadow-xl mt-4">S'INSCRIRE</button>
            <p onclick="showPage('login-page')" class="text-center text-sm font-bold text-gray-500 mt-6 cursor-pointer">J'ai déjà un compte</p>
        </div>
    </div>

    <div id="login-page" class="page px-8 pt-20">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black italic tracking-tighter text-zinc-900">DIOR<span class="text-orange-500">2026</span></h1>
            <p class="text-[10px] uppercase tracking-[0.4em] mt-3 font-bold text-gray-400">Connexion</p>
        </div>
        <div class="space-y-5">
            <div class="bg-gray-50 rounded-3xl p-5 border border-gray-100 flex items-center">
                <i class="fas fa-phone text-gray-300 mr-4"></i>
                <input id="login-phone" type="tel" placeholder="Téléphone" class="bg-transparent outline-none flex-1 font-bold">
            </div>
            <div class="bg-gray-50 rounded-3xl p-5 border border-gray-100 flex items-center">
                <i class="fas fa-lock text-gray-300 mr-4"></i>
                <input id="login-pass" type="password" placeholder="Mot de passe" class="bg-transparent outline-none flex-1 font-bold">
            </div>
            <button onclick="handleAuth('login')" class="w-full bg-zinc-900 text-white py-6 rounded-3xl font-black text-lg shadow-2xl mt-4">ACCÉDER</button>
            <p onclick="showPage('register-page')" class="text-center text-sm font-bold text-gray-500 mt-6 cursor-pointer">Pas encore de compte ?</p>
        </div>
    </div>

    <div id="home-page" class="page">
        <div class="relative h-48 bg-zinc-900 p-8 flex flex-col justify-end text-white">
            <h1 class="text-3xl font-black leading-tight">Générez des revenus</h1>
            <p class="text-orange-500 text-xs font-bold uppercase">Plateforme Officielle</p>
        </div>
        
        <div class="grid grid-cols-4 gap-4 p-6 text-center text-[9px] font-black uppercase text-gray-500">
            <div onclick="alert('Bientôt disponible')"><div class="bg-gray-100 p-4 rounded-full mb-2 flex justify-center items-center h-12 w-12 mx-auto"><i class="fas fa-plus text-zinc-800"></i></div> DÉPOSER</div>
            <div onclick="showPage('retrait-page')"><div class="bg-gray-100 p-4 rounded-full mb-2 flex justify-center items-center h-12 w-12 mx-auto"><i class="fas fa-arrow-down text-orange-600"></i></div> RETIRER</div>
            <div onclick="window.open('https://t.me/+ONx7pIapuKxhNWU8', '_blank')"><div class="bg-gray-100 p-4 rounded-full mb-2 flex justify-center items-center h-12 w-12 mx-auto"><i class="fab fa-telegram-plane text-blue-500"></i></div> SUPPORT</div>
            <div id="btn-pointage" onclick="doPointage()"><div class="bg-gray-100 p-4 rounded-full mb-2 flex justify-center items-center h-12 w-12 mx-auto"><i class="fas fa-check-circle text-green-600"></i></div> POINTAGE</div>
        </div>

        <div class="px-6">
            <div class="bg-zinc-900 p-8 rounded-[40px] text-white shadow-2xl relative overflow-hidden">
                <p class="text-[10px] opacity-50 font-bold uppercase mb-1">Solde Actuel</p>
                <h2 class="text-4xl font-black text-orange-500"><span class="solde-val">0</span> <span class="text-lg">FCFA</span></h2>
            </div>
        </div>
    </div>

    <div id="produit-page" class="page p-6">
        <h2 class="text-2xl font-black mb-6 uppercase tracking-tighter">Produits</h2>
        <div id="product-list" class="space-y-4"></div>
    </div>

    <div id="profil-page" class="page">
        <div class="p-8">
            <h2 class="text-4xl font-black mb-1"><span class="solde-val">0</span> <span class="text-xl">F</span></h2>
            <p class="text-[10px] text-gray-400 font-bold uppercase mb-8 tracking-widest">Solde disponible</p>

            <div class="mb-10">
                <h3 class="text-xs font-black uppercase text-gray-400 mb-4">Mes Commandes</h3>
                <div id="mes-commandes-list" class="space-y-3"></div>
            </div>

            <div class="space-y-4">
                <div onclick="showPage('historique-page')" class="flex items-center justify-between p-4 border-b border-gray-50 cursor-pointer">
                    <div class="flex items-center gap-4"><i class="fas fa-history text-gray-400"></i><span class="text-xs font-bold">Historique</span></div>
                    <i class="fas fa-chevron-right text-gray-300"></i>
                </div>
                <div onclick="location.reload()" class="p-4 text-center text-red-500 font-black text-[10px] uppercase mt-10 cursor-pointer">Déconnexion</div>
            </div>
        </div>
    </div>

    <div id="historique-page" class="page p-6">
        <div class="flex items-center gap-4 mb-6" onclick="showPage('profil-page')"><i class="fas fa-arrow-left"></i><h2 class="font-black uppercase">Détails</h2></div>
        <div id="log-list" class="space-y-3"></div>
    </div>

    <nav id="main-nav" class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-100 flex justify-around py-5 z-50 hidden">
        <button onclick="showPage('home-page')" class="flex flex-col items-center"><i class="fas fa-home"></i><span class="text-[8px] font-black uppercase mt-1">Accueil</span></button>
        <button onclick="showPage('produit-page')" class="flex flex-col items-center"><i class="fas fa-shopping-bag"></i><span class="text-[8px] font-black uppercase mt-1">Produit</span></button>
        <button onclick="showPage('profil-page')" class="flex flex-col items-center"><i class="fas fa-user"></i><span class="text-[8px] font-black uppercase mt-1">Profil</span></button>
    </nav>
</div>

<script>
    const produits = [
        { id: 0, nom: "S0", prix: 0, gain: 200 },
        { id: 1, nom: "S1", prix: 10000, gain: 500 },
        { id: 2, nom: "S2", prix: 30000, gain: 1515 },
        { id: 3, nom: "S3", prix: 70000, gain: 3571 },
        { id: 10, nom: "S10", prix: 5000000, gain: 277777 }
    ];

    let currentUser = null;

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const target = document.getElementById(id);
        if (target) {
            target.classList.add('active');
            if(id === 'profil-page') updateCommandesUI();
        }
    }

    function handleAuth(type) {
        const phone = document.getElementById(type === 'register' ? 'reg-phone' : 'login-phone').value;
        const pass = document.getElementById(type === 'register' ? 'reg-pass' : 'login-pass').value;

        if(!phone || phone.length < 8) return alert("Numéro invalide");
        
        if(type === 'register') {
            const user = { phone, pass, balance: 1000, logs: [], mesCommandes: [], lastPointage: null, s0Used: false };
            localStorage.setItem('dior_user_' + phone, JSON.stringify(user));
            alert("Compte créé ! Connectez-vous.");
            showPage('login-page');
        } else {
            const stored = localStorage.getItem('dior_user_' + phone);
            if(!stored) return alert("Compte inexistant");
            const user = JSON.parse(stored);
            if(user.pass !== pass) return alert("Erreur mot de passe");
            currentUser = user;
            
            document.getElementById('loader').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-nav').classList.remove('hidden');
                updateUI();
                initProducts();
                showPage('home-page');
            }, 1000);
        }
    }

    function initProducts() {
        const list = document.getElementById('product-list');
        list.innerHTML = "";
        produits.forEach(p => {
            // Règle : Enlever s10 du nom
            const cleanName = p.nom.replace(/s10/gi, '');
            list.innerHTML += `
                <div class="bg-white border border-gray-100 p-5 rounded-3xl flex justify-between items-center">
                    <div>
                        <h4 class="font-black">${cleanName}</h4>
                        <p class="text-orange-500 font-bold text-xs">${p.prix} F</p>
                    </div>
                    <button onclick="acheterProduit(${p.id})" class="bg-black text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase">Investir</button>
                </div>`;
        });
    }

    function acheterProduit(id) {
        const p = produits.find(item => item.id === id);
        if(p.id === 0 && currentUser.s0Used) return alert("Déjà utilisé");
        if(currentUser.balance < p.prix) return alert("Solde insuffisant");

        currentUser.balance -= p.prix;
        if(p.id === 0) currentUser.s0Used = true;

        const now = Date.now();
        const cleanName = p.nom.replace(/s10/gi, '');
        
        currentUser.mesCommandes.push({
            id: now,
            nom: cleanName,
            gain: p.gain,
            dateAchat: new Date().toLocaleString(),
            lastCollect: now // Pour le cycle de 24h
        });

        currentUser.logs.push({ type: "Achat " + cleanName, amount: -p.prix, date: new Date().toLocaleString() });
        alert("Achat réussi !");
        updateUI();
    }

    function updateCommandesUI() {
        const container = document.getElementById('mes-commandes-list');
        if(!currentUser.mesCommandes.length) {
            container.innerHTML = '<p class="text-xs text-gray-400 italic">Aucun produit actif.</p>';
            return;
        }
        
        container.innerHTML = "";
        const now = Date.now();
        currentUser.mesCommandes.forEach(c => {
            const diff = now - c.lastCollect;
            const isReady = diff >= (24 * 60 * 60 * 1000); // Règle des 24h

            container.innerHTML += `
                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <div class="flex justify-between mb-2">
                        <span class="font-black text-xs uppercase">${c.nom}</span>
                        <span class="text-orange-500 font-black text-xs">+${c.gain} F</span>
                    </div>
                    <p class="text-[8px] text-gray-400 mb-2">Acheté à: ${c.dateAchat}</p>
                    ${isReady ? 
                        `<button onclick="recolter(${c.id})" class="w-full bg-green-500 text-white py-2 rounded-lg text-[9px] font-black uppercase">Récolter</button>` : 
                        `<div class="text-[8px] text-center font-bold text-gray-400 py-2 bg-gray-100 rounded-lg">REVENU DANS 24H</div>`
                    }
                </div>`;
        });
    }

    function recolter(id) {
        const c = currentUser.mesCommandes.find(item => item.id === id);
        currentUser.balance += c.gain;
        c.lastCollect = Date.now();
        currentUser.logs.push({ type: "Revenu " + c.nom, amount: c.gain, date: new Date().toLocaleString() });
        alert("Gain ajouté !");
        updateUI();
        updateCommandesUI();
    }

    function updateUI() {
        document.querySelectorAll('.solde-val').forEach(el => el.innerText = Math.floor(currentUser.balance));
        const logList = document.getElementById('log-list');
        if(logList) {
            logList.innerHTML = "";
            currentUser.logs.slice().reverse().forEach(l => {
                logList.innerHTML += `<div class="p-3 bg-gray-50 rounded-xl flex justify-between text-[10px] font-bold"><span>${l.type}</span><span class="${l.amount > 0 ? 'text-green-500' : 'text-red-500'}">${l.amount} F</span></div>`;
            });
        }
        localStorage.setItem('dior_user_' + currentUser.phone, JSON.stringify(currentUser));
    }

    function doPointage() {
        const today = new Date().toDateString();
        if(currentUser.lastPointage === today) return alert("Déjà fait !");
        currentUser.balance += 50;
        currentUser.lastPointage = today;
        currentUser.logs.push({type: "Pointage", amount: 50, date: new Date().toLocaleString()});
        updateUI();
    }
</script>
</body>
</html>
