<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIOR FASHION - Authentification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #d4af37; --dark: #000; --grey: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark); color: white; overflow-x: hidden; }
        
        /* --- STYLE EXTÉRIEUR --- */
        #auth-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; text-align: center; }
        .logo-dior { font-size: 50px; font-weight: bold; letter-spacing: 10px; margin-bottom: 30px; color: white; }
        .tabs { display: flex; gap: 40px; margin-bottom: 30px; border-bottom: 1px solid #333; width: 100%; justify-content: center; }
        .tab { padding: 10px 20px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .auth-form { width: 100%; max-width: 350px; }
        .input-group { position: relative; margin-bottom: 20px; border-bottom: 1px solid #444; }
        .input-group select, .input-group input { width: 100%; background: none; border: none; color: white; padding: 12px; outline: none; font-size: 16px; }
        .btn-gold { width: 100%; padding: 15px; border: 1px solid var(--gold); background: none; color: var(--gold); font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn-gold:hover { background: var(--gold); color: black; }

        /* --- STYLE INTÉRIEUR --- */
        #main-app { display: none; }
        .header { background: var(--grey); padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; background: var(--grey); }
        .action-item { text-align: center; font-size: 11px; }
        .action-item i { font-size: 24px; color: var(--gold); margin-bottom: 8px; display: block; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-card { background: var(--grey); padding: 15px; text-align: center; border-radius: 5px; border: 1px solid #333; }
        .stat-card b { font-size: 18px; color: var(--gold); }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="logo-dior">DIOR</div>
        <div class="tabs">
            <div id="tab-login" class="tab" onclick="switchTab('login')">Connexion</div>
            <div id="tab-register" class="tab active" onclick="switchTab('register')">Inscription</div>
        </div>

        <div class="auth-form">
            <div class="input-group">
                <select id="pays">
                    <option value="+226">Burkina Faso (+226)</option>
                    <option value="+229">Bénin (+229)</option>
                </select>
            </div>
            <div class="input-group">
                <input type="number" id="numero" placeholder="Numéro de téléphone">
            </div>
            <div class="input-group">
                <input type="password" id="code" placeholder="Code secret">
            </div>
            <div class="input-group" id="group-parrain">
                <input type="text" id="parrain" placeholder="Code parrainage (optionnel)">
            </div>
            <button class="btn-gold" id="btn-auth" onclick="validerAuth()">Créer mon compte</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <div class="logo-dior" style="font-size: 24px; margin: 0;">DIOR</div>
        </div>
        
        <div class="action-grid">
            <div class="action-item"><i class="fas fa-wallet"></i><span>Recharger</span></div>
            <div class="action-item"><i class="fas fa-hand-holding-usd"></i><span>Retirer</span></div>
            <div class="action-item"><i class="fas fa-headset"></i><span>Service</span></div>
            <div class="action-item"><i class="fas fa-gift"></i><span>Cadeau</span></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><b><span id="solde-val">0</span> F</b><br><small>Solde Compte</small></div>
            <div class="stat-card"><b>0 F</b><br><small>Revenu Total</small></div>
            <div class="stat-card"><b>0 F</b><br><small>Commission</small></div>
        </div>
    </div>

    <script>
        // TES CLÉS SUPABASE
        const supabaseUrl = "https://ciamfmmmznshnmmtxntf.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXByYWJhc2UiLCJhdWQiOiJhbm9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU0MzM4MzksImV4cCI6MjA2MTAwOTgzOX0.er_YZ2Mg-fwwXLPkS20eli1hO8eCfd8DReOferSBw3M";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let modeLogin = false;

        function switchTab(mode) {
            modeLogin = (mode === 'login');
            document.getElementById('tab-login').className = modeLogin ? 'tab active' : 'tab';
            document.getElementById('tab-register').className = modeLogin ? 'tab' : 'tab active';
            document.getElementById('group-parrain').style.display = modeLogin ? 'none' : 'block';
            document.getElementById('btn-auth').innerText = modeLogin ? 'Se connecter' : 'Créer mon compte';
        }

        async function validerAuth() {
            const pays = document.getElementById('pays').value;
            const num = document.getElementById('numero').value;
            const code = document.getElementById('code').value;
            const complet = pays + num;

            if(!num || !code) { alert("Veuillez remplir les champs !"); return; }

            if(!modeLogin) {
                // INSCRIPTION + BONUS 500 F
                const { data, error } = await _supabase
                    .from('utilisateurs')
                    .insert([{ numero: complet, pin: code, solde: 500 }]);

                if (error) {
                    // C'EST CETTE LIGNE QUI NOUS DIRA LA VÉRITÉ :
                    alert("Erreur Supabase : " + error.message);
                } else {
                    alert("Succès ! 500 F de bonus ajoutés.");
                    ouvrirApp(500);
                }
            } else {
                // CONNEXION
                const { data, error } = await _supabase
                    .from('utilisateurs')
                    .select('*')
                    .eq('numero', complet)
                    .eq('pin', code);

                if (data && data.length > 0) {
                    ouvrirApp(data[0].solde);
                } else {
                    alert("Numéro ou code secret incorrect.");
                }
            }
        }

        function ouvrirApp(montant) {
            document.getElementById('solde-val').innerText = montant;
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        }
    </script>
</body>
</html>
