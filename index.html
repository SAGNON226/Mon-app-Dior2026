<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIOR FASHION - Investissement Professionnel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #d4af37; --dark: #000; --grey: #1a1a1a; --card: #252525; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark); color: white; overflow-x: hidden; padding-bottom: 70px; }
        
        /* AUTH & UTILS */
        .hidden { display: none !important; }
        .logo-dior { font-size: 40px; letter-spacing: 12px; font-weight: 300; text-align: center; margin: 30px 0; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 12px; font-weight: bold; width: 100%; border-radius: 5px; cursor: pointer; }

        /* DASHBOARD */
        .banner { width: 100%; height: 180px; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=1000&auto=format&fit=crop'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-size: 28px; border-bottom: 3px solid var(--gold); }
        .balance-card { background: var(--grey); margin: -30px 20px 20px 20px; padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; position: relative; z-index: 10; }
        .balance-amount { font-size: 30px; color: var(--gold); font-weight: bold; }

        /* VIP CARDS */
        .vip-container { padding: 15px; }
        .vip-card { background: var(--card); border-radius: 10px; margin-bottom: 15px; display: flex; overflow: hidden; border: 1px solid #333; }
        .vip-img { width: 100px; height: 100px; object-fit: cover; }
        .vip-info { padding: 10px; flex: 1; }
        .vip-price { color: var(--gold); font-weight: bold; }

        /* NAVIGATION */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        .nav-item { color: #888; font-size: 11px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 3px; }

        /* PAGES SECTIONS */
        .page-content { padding: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="auth-section">
        <div class="logo-dior">DIOR</div>
        <div style="padding: 20px; max-width: 350px; margin: auto; background: var(--grey); border-radius: 10px;">
            <div class="input-group">
                <input type="number" id="auth-num" placeholder="Numéro de téléphone">
            </div>
            <div class="input-group">
                <input type="password" id="auth-pin" placeholder="Code secret (PIN)">
            </div>
            <div class="input-group" id="reg-bonus">
                <input type="text" id="auth-ref" placeholder="Code d'invitation (Optionnel)">
            </div>
            <button class="btn-gold" onclick="connexion()">SE CONNECTER / S'INSCRIRE</button>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <div id="page-home" class="page">
            <div class="banner">DIOR FASHION</div>
            <div class="balance-card">
                <small>MON SOLDE</small>
                <div class="balance-amount"><span id="user-money">0</span> F CFA</div>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="btn-gold" style="padding: 8px; font-size: 12px;">DÉPÔT</button>
                    <button class="btn-gold" style="padding: 8px; font-size: 12px; background: white;">RETRAIT</button>
                </div>
            </div>
            <div class="vip-container">
                <h3 style="border-left: 3px solid var(--gold); padding-left: 10px;">PRODUITS VIP</h3>
                <div class="vip-card">
                    <img src="https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=200" class="vip-img">
                    <div class="vip-info">
                        <b>Sac Lady Dior VIP 1</b><br>
                        <span class="vip-price">Prix: 5 000 F</span><br>
                        <small>Revenu: 500 F / jour</small>
                        <button class="btn-gold" style="margin-top: 5px; padding: 5px;">Investir</button>
                    </div>
                </div>
                <div class="vip-card">
                    <img src="https://images.unsplash.com/photo-1591360236480-4ed861025fa1?w=200" class="vip-img">
                    <div class="vip-info">
                        <b>Parfum Sauvage VIP 2</b><br>
                        <span class="vip-price">Prix: 15 000 F</span><br>
                        <small>Revenu: 1 800 F / jour</small>
                        <button class="btn-gold" style="margin-top: 5px; padding: 5px;">Investir</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-team" class="page-content hidden">
            <h2 style="color: var(--gold);">MON ÉQUIPE</h2>
            <div class="balance-card">
                <small>Mon Code d'Invitation</small>
                <div style="font-size: 20px; font-weight: bold; margin: 10px 0;" id="my-ref-code">DIOR-XXXX</div>
                <button onclick="copyRef()" style="background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; border-radius: 5px; cursor: pointer;">Copier le lien</button>
            </div>
            <div style="background: var(--grey); padding: 15px; border-radius: 10px;">
                <h4>Membres invités : <span id="team-count">0</span></h4>
                <div id="team-list" style="font-size: 13px; color: #aaa;">
                    Aucun ami invité pour le moment.
                </div>
            </div>
        </div>

        <nav class="nav-bottom">
            <div class="nav-item active" onclick="showPage('home', this)"><i class="fas fa-home"></i>Accueil</div>
            <div class="nav-item" onclick="showPage('team', this)"><i class="fas fa-users"></i>Équipe</div>
            <div class="nav-item"><i class="fas fa-wallet"></i>Finance</div>
            <div class="nav-item" onclick="location.reload()"><i class="fas fa-user"></i>Profil</div>
        </nav>
    </div>

    <script>
        // CONFIGURATION SUPABASE
        const supabaseUrl = "https://ciamfmmmznshnmmtxntf.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpYW1mbW1tem5zaG5tbXR4bnRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDYwNjgsImV4cCI6MjA5MTIyMjA2OH0.er_YZ2Mg-fwwXLPkS20eli1hO8eCfd8DReOferSBw3M";
        const _sb = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;

        async function connexion() {
            const num = document.getElementById('auth-num').value;
            const pin = document.getElementById('auth-pin').value;
            const ref = document.getElementById('auth-ref').value;

            if(!num || !pin) return alert("Remplissez vos accès !");

            // 1. Tenter de trouver l'utilisateur
            let { data: user, error } = await _sb.from('utilisateurs').select('*').eq('numero', num).eq('pin', pin).single();

            if (user) {
                loginSuccess(user);
            } else {
                // 2. Si non trouvé, on l'inscrit (Inscription automatique)
                const myNewRef = "DIOR-" + Math.floor(1000 + Math.random() * 9000);
                const { data: newUser, error: regErr } = await _sb.from('utilisateurs').insert([
                    { numero: num, pin: pin, solde: 500, invite_par: ref }
                ]).select().single();

                if (regErr) alert("Erreur: " + regErr.message);
                else {
                    alert("Bienvenue ! 500 F offerts.");
                    loginSuccess(newUser);
                }
            }
        }

        function loginSuccess(user) {
            currentUser = user;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-money').innerText = user.solde;
            document.getElementById('my-ref-code').innerText = "DIOR-" + user.numero.slice(-4);
            loadTeam();
        }

        async function loadTeam() {
            // Chercher les gens qui ont mis notre numéro comme parrain
            const myCode = currentUser.numero;
            const { data: team, error } = await _sb.from('utilisateurs').select('numero').eq('invite_par', myCode);
            
            if(team && team.length > 0) {
                document.getElementById('team-count').innerText = team.length;
                document.getElementById('team-list').innerHTML = team.map(m => `<div>👤 Membre: ${m.numero.slice(0, 6)}****</div>`).join('');
            }
        }

        function showPage(pageId, el) {
            document.querySelectorAll('.page, .page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            el.classList.add('active');
        }

        function copyRef() {
            const code = document.getElementById('my-ref-code').innerText;
            navigator.clipboard.writeText("Inscris-toi sur Dior avec mon code : " + code);
            alert("Lien de parrainage copié !");
        }
    </script>
</body>
</html>
