<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dior2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <div id="admin-auth" class="fixed inset-0 bg-zinc-900 z-[1000] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl text-center">
            <h1 class="text-2xl font-black mb-6 uppercase tracking-tighter">Accès <span class="text-orange-500">Sécurisé</span></h1>
            <input id="admin-pass" type="password" placeholder="Code secret" class="w-full p-4 bg-gray-100 rounded-2xl mb-4 text-center font-bold outline-none border-2 focus:border-orange-500">
            <button onclick="checkAdminAuth()" class="w-full bg-black text-white py-4 rounded-2xl font-black hover:bg-orange-500 transition">ENTRER</button>
        </div>
    </div>

    <header class="bg-white p-6 shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h2 class="font-black text-xl italic">DIOR2026 <span class="text-orange-500 text-sm">ADMIN</span></h2>
            <button onclick="loadUsers()" class="bg-gray-100 p-3 rounded-xl hover:bg-gray-200"><i class="fas fa-sync-alt"></i></button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-zinc-900 p-6 rounded-[30px] text-white">
                <p class="text-[10px] opacity-60 font-bold uppercase">Utilisateurs</p>
                <h3 id="stat-total" class="text-3xl font-black">0</h3>
            </div>
            <div class="bg-orange-500 p-6 rounded-[30px] text-white">
                <p class="text-[10px] opacity-60 font-bold uppercase">Membres Actifs</p>
                <h3 id="stat-actifs" class="text-3xl font-black">0</h3>
            </div>
        </div>

        <div id="users-container" class="space-y-4">
            </div>
    </main>

    <script>
        const _URL = "https://ciamfmmmznshnmmtxntf.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpYW1mbW1tem5zaG5tbXR4bnRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDYwNjgsImV4cCI6MjA5MTIyMjA2OH0.er_YZ2Mg-fwwXLPkS20eli1hO8eCfd8DReOferSBw3M";
        const supabaseAdmin = supabase.createClient(_URL, _KEY);

        function checkAdminAuth() {
            if(document.getElementById('admin-pass').value === "1234") { // Change ton code ici
                document.getElementById('admin-auth').style.display = 'none';
                loadUsers();
            } else { alert("Code incorrect"); }
        }

        async function loadUsers() {
            const container = document.getElementById('users-container');
            container.innerHTML = '<p class="text-center py-10 font-bold text-gray-400">Synchronisation...</p>';

            const { data: users, error } = await supabaseAdmin.from('utilisateurs').select('*').order('created_at', { ascending: false });

            if(error) return alert(error.message);

            document.getElementById('stat-total').innerText = users.length;
            document.getElementById('stat-actifs').innerText = users.filter(u => u.statut === 'actif').length;

            container.innerHTML = "";
            users.forEach(user => {
                const isBanned = user.statut === 'banni';
                const currentGrade = (user.orders && user.orders.length > 0) ? user.orders[0].nom : "S0 (Aucun)";

                container.innerHTML += `
                    <div class="bg-white p-6 rounded-[30px] shadow-sm border ${isBanned ? 'border-red-500 bg-red-50' : 'border-gray-100'}">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-black text-lg">${user.phone_number_code}</h4>
                                <p class="text-[10px] font-black uppercase text-orange-500">Grade Actuel : ${currentGrade}</p>
                            </div>
                            <div class="text-right font-black text-2xl text-green-600">${user.balance} F</div>
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="updateBalance('${user.phone_number_code}')" class="bg-gray-100 p-3 rounded-2xl text-[10px] font-black uppercase"><i class="fas fa-wallet mr-2"></i>Modifier Solde</button>
                            <button onclick="setVIPGrade('${user.phone_number_code}')" class="bg-zinc-900 text-white p-3 rounded-2xl text-[10px] font-black uppercase"><i class="fas fa-crown mr-2 text-yellow-400"></i>Attribuer Grade</button>
                            <button onclick="toggleBan('${user.phone_number_code}', '${user.statut}')" class="col-span-2 ${isBanned ? 'bg-green-500' : 'bg-red-500'} text-white p-3 rounded-2xl text-[10px] font-black uppercase mt-2">
                                ${isBanned ? 'Rétablir le compte' : 'Bannir l\'utilisateur'}
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        async function updateBalance(phone) {
            const amount = prompt("Nouveau solde total (FCFA) :");
            if (amount === null) return;
            await supabaseAdmin.from('utilisateurs').update({ balance: parseInt(amount) }).eq('phone_number_code', phone);
            loadUsers();
        }

        async function setVIPGrade(phone) {
            const niveau = prompt("Entrez le niveau (Ex: S1, S2, S5, S9) :");
            if (!niveau) return;
            
            const num = parseInt(niveau.replace('S', ''));
            const gains = {0:0, 1:600, 2:1500, 3:3500, 4:8000, 5:18000, 6:40000, 7:90000, 8:200000, 9:500000};

            if(isNaN(num) || num > 9) return alert("Niveau invalide");

            const newOrder = [{
                id: num,
                nom: "S" + num,
                gain: gains[num],
                dateAchat: new Date().toLocaleString(),
                lastClaim: new Date().getTime()
            }];

            await supabaseAdmin.from('utilisateurs').update({ orders: newOrder, role: 'vip' }).eq('phone_number_code', phone);
            alert("Grade " + niveau + " activé !");
            loadUsers();
        }

        async function toggleBan(phone, current) {
            const next = current === 'actif' ? 'banni' : 'actif';
            if(confirm("Changer le statut en " + next + " ?")) {
                await supabaseAdmin.from('utilisateurs').update({ statut: next }).eq('phone_number_code', phone);
                loadUsers();
            }
        }
    </script>
</body>
</html>
