<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dior2026 - Panel Administration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f4f7f6; font-family: sans-serif; }
        .user-card { transition: transform 0.2s; }
        .user-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black text-zinc-900">DIOR<span class="text-orange-500">2026</span> <span class="text-sm font-normal text-gray-500">| Panel Admin</span></h1>
            <button onclick="loadUsers()" class="bg-zinc-900 text-white px-6 py-2 rounded-xl font-bold hover:bg-zinc-700">
                <i class="fas fa-sync-alt mr-2"></i> Actualiser
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <p class="text-gray-400 text-xs font-bold uppercase">Total Utilisateurs</p>
                <h3 id="stat-total" class="text-3xl font-black">0</h3>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <p class="text-gray-400 text-xs font-bold uppercase">Volume des Soldes</p>
                <h3 id="stat-money" class="text-3xl font-black text-orange-500">0 F</h3>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <p class="text-gray-400 text-xs font-bold uppercase">Statut Serveur</p>
                <h3 class="text-3xl font-black text-green-500 italic">ACTIF</h3>
            </div>
        </div>

        <h2 class="text-xl font-black mb-6 uppercase">Gestion des Membres</h2>
        <div id="users-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="text-gray-400 italic">Chargement des données...</p>
        </div>
    </div>

<script>
    // --- CONNEXION SUPABASE (Mêmes clés que ton app) ---
    const _URL = "https://ciamfmmmznshnmmtxntf.supabase.co";
    const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpYW1mbW1tem5zaG5tbXR4bnRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDYwNjgsImV4cCI6MjA5MTIyMjA2OH0.er_YZ2Mg-fwwXLPkS20eli1hO8eCfd8DReOferSBw3M";
    const supabaseClient = supabase.createClient(_URL, _KEY);

    async function loadUsers() {
        const { data: users, error } = await supabaseClient
            .from('utilisateurs')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) return alert("Erreur : " + error.message);

        const container = document.getElementById('users-container');
        container.innerHTML = "";

        let totalBalance = 0;
        document.getElementById('stat-total').innerText = users.length;

        users.forEach(user => {
            totalBalance += user.balance || 0;
            const isBanni = user.statut === 'banni';
            const grade = user.orders && user.orders.length > 0 ? user.orders[user.orders.length - 1].nom : "Aucun";

            container.innerHTML += `
                <div class="bg-white p-6 rounded-[30px] shadow-sm border ${isBanni ? 'border-red-200 bg-red-50' : 'border-gray-100'} user-card">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="font-black text-lg">${user.phone_number_code}</p>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">Grade : ${grade}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${isBanni ? 'bg-red-500 text-white' : 'bg-green-100 text-green-600'}">
                            ${user.statut}
                        </span>
                    </div>

                    <div class="mb-6">
                        <p class="text-[10px] text-gray-400 font-bold uppercase">Solde Actuel</p>
                        <input type="number" id="input-bal-${user.phone_number_code}" value="${user.balance}" 
                            class="w-full text-2xl font-black bg-transparent border-b border-gray-200 focus:border-orange-500 outline-none">
                    </div>

                    <div class="flex gap-2">
                        <button onclick="updateBalance('${user.phone_number_code}')" class="flex-1 bg-orange-500 text-white py-3 rounded-xl font-bold text-xs uppercase">Modifier</button>
                        <button onclick="toggleBan('${user.phone_number_code}', '${user.statut}')" class="px-4 py-3 rounded-xl border border-gray-200 hover:bg-gray-100">
                            <i class="fas ${isBanni ? 'fa-user-check text-green-500' : 'fa-user-slash text-red-500'}"></i>
                        </button>
                    </div>
                </div>
            `;
        });

        document.getElementById('stat-money').innerText = totalBalance.toLocaleString() + " F";
    }

    // FONCTION : MODIFIER LE SOLDE
    async function updateBalance(phone) {
        const newVal = document.getElementById('input-bal-' + phone).value;
        
        const { error } = await supabaseClient
            .from('utilisateurs')
            .update({ balance: parseInt(newVal) })
            .eq('phone_number_code', phone);

        if (error) {
            alert("Erreur de mise à jour");
        } else {
            alert("Solde mis à jour pour " + phone);
            loadUsers();
        }
    }

    // FONCTION : BANNIRE / RÉACTIVER
    async function toggleBan(phone, currentStatut) {
        const newStatut = currentStatut === 'actif' ? 'banni' : 'actif';
        
        const { error } = await supabaseClient
            .from('utilisateurs')
            .update({ statut: newStatut })
            .eq('phone_number_code', phone);

        if (error) {
            alert("Erreur");
        } else {
            loadUsers();
        }
    }

    // Charger les utilisateurs au démarrage
    loadUsers();
</script>
</body>
</html>
