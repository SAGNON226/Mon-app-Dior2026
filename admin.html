
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIOR 2026 - PANEL ADMIN OFFICIEL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #09090b; font-family: sans-serif; }
        .user-card { background: #18181b; border: 1px solid #27272a; transition: all 0.2s; }
        .user-card:hover { border-color: #f97316; }
    </style>
</head>
<body class="text-white pb-20">

    <div class="p-6 border-b border-zinc-800 bg-zinc-900 sticky top-0 z-50">
        <h1 class="text-xl font-black italic tracking-tighter">DIOR<span class="text-orange-500">2026</span> <span class="text-xs ml-2 text-zinc-500 font-normal uppercase tracking-widest">Administration</span></h1>
    </div>

    <div class="p-6 max-w-md mx-auto">
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-zinc-900 p-5 rounded-3xl border border-zinc-800 text-center">
                <p class="text-[10px] text-zinc-500 font-black uppercase mb-1">Membres</p>
                <h2 id="total-users" class="text-2xl font-black text-white">0</h2>
            </div>
            <div class="bg-zinc-900 p-5 rounded-3xl border border-zinc-800 text-center text-orange-500">
                <p class="text-[10px] text-zinc-500 font-black uppercase mb-1">Total Flux</p>
                <h2 id="total-balance" class="text-xl font-black">0 F</h2>
            </div>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h3 class="font-black uppercase text-xs tracking-widest text-zinc-400">Liste des investisseurs</h3>
            <button onclick="loadUsers()" class="text-orange-500 text-xs font-bold"><i class="fas fa-sync-alt"></i> Actualiser</button>
        </div>

        <div id="user-list" class="space-y-4">
            <div class="text-center py-20 text-zinc-600">
                <div class="animate-spin mb-4"><i class="fas fa-circle-notch text-2xl"></i></div>
                <p class="text-xs font-bold uppercase tracking-widest">Connexion à Supabase...</p>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION SUPABASE DIRECTE
        const SUPABASE_URL = 'https://ciamfmmmznshnmmtxntf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpYW1mbW1tem5zaG5tbXR4bnRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDYwNjgsImV4cCI6MjA5MTIyMjA2OH0.er_YZ2Mg-fwwXLPkS20eli1hO8eCfd8DReOferSBw3M';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadUsers() {
            const listDiv = document.getElementById('user-list');
            
            const { data, error } = await _supabase
                .from('utilisateurs')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                listDiv.innerHTML = `<p class="text-red-500 text-xs">Erreur : ${error.message}</p>`;
                return;
            }

            listDiv.innerHTML = "";
            let fluxTotal = 0;
            document.getElementById('total-users').innerText = data.length;

            data.forEach(user => {
                fluxTotal += (user.balance || 0);
                listDiv.innerHTML += `
                    <div class="user-card p-5 rounded-[32px]">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-black text-white">${user.phone}</h4>
                                <p class="text-[10px] text-zinc-500 font-mono">ID: ${user.invite_code || 'N/A'}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-xs font-bold text-zinc-500 uppercase">Solde</span>
                                <p class="text-lg font-black text-orange-500">${Math.floor(user.balance || 0).toLocaleString()} <span class="text-[10px]">F</span></p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="updateBalance('${user.phone}', ${user.balance})" class="bg-white text-black py-3 rounded-2xl font-black text-[10px] uppercase">Ajouter Fonds</button>
                            <button onclick="deleteUser('${user.phone}')" class="bg-zinc-800 text-red-500 py-3 rounded-2xl font-black text-[10px] uppercase">Supprimer</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('total-balance').innerText = Math.floor(fluxTotal).toLocaleString() + " F";
        }

        async function updateBalance(phone, current) {
            const amount = prompt(`Entrez le NOUVEAU SOLDE total pour ${phone} :`, current);
            if (amount !== null && !isNaN(amount)) {
                const { error } = await _supabase
                    .from('utilisateurs')
                    .update({ balance: parseFloat(amount) })
                    .eq('phone', phone);
                
                if (error) alert("Erreur : " + error.message);
                else {
                    alert("Succès ! Solde mis à jour.");
                    loadUsers();
                }
            }
        }

        async function deleteUser(phone) {
            if(confirm(`Voulez-vous vraiment bannir le numéro ${phone} ?`)) {
                const { error } = await _supabase
                    .from('utilisateurs')
                    .delete()
                    .eq('phone', phone);
                
                if (error) alert("Erreur : " + error.message);
                else loadUsers();
            }
        }

        // Lancement auto au chargement
        window.onload = loadUsers;
    </script>
</body>
</html>
