<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dior2026 - Plateforme Officielle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dior-orange: #e88e0c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fdfdfd; margin: 0; }
        .page { display: none; padding-bottom: 100px; animation: fadeIn 0.4s ease-out; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; }
        .product-card-dior { background: white; border-radius: 24px; border: 1px solid #f0f0f0; overflow: hidden; }
        .bank-input-group { margin-bottom: 25px; }
        .bank-input-group label { display: block; color: white; font-size: 15px; margin-bottom: 5px; }
        .bank-input-group input, .bank-input-group select { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.4); color: white; padding: 12px 0; outline: none; }
        .country-select { background: transparent; border: none; outline: none; font-weight: bold; color: #9ca3af; }
    </style>
</head>
<body>

<div id="loader">
    <div class="w-12 h-12 border-4 border-black border-t-orange-500 rounded-full animate-spin mb-4"></div>
    <p class="font-black text-xs uppercase tracking-widest text-zinc-900">Chargement Dior2026...</p>
</div>

<div class="max-w-md mx-auto min-h-screen shadow-2xl relative bg-white">

    <div id="register-page" class="page active px-8 pt-20">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black italic tracking-tighter text-zinc-900">DIOR<span class="text-orange-500">2026</span></h1>
        </div>
        <div class="space-y-5">
            <div class="bg-gray-50 rounded-3xl p-5 border border-gray-100 flex items-center">
                <select id="reg-country" class="country-select mr-2">
                    <option value="+226">🇧🇫 +226</option><option value="+228">🇹🇬 +228</option><option value="+229">🇧🇯 +229</option>
                </select>
                <input id="reg-phone" type="tel" placeholder="Téléphone" class="bg-transparent outline-none flex-1 font-bold">
            </div>
            <input id="reg-pass" type="password" placeholder="Mot de passe" class="w-full p-5 bg-gray-50 rounded-3xl border outline-none font-bold">
            <input id="reg-invite" type="text" placeholder="Code d'invitation (Optionnel)" class="w-full p-5 bg-orange-50 rounded-3xl border border-orange-100 outline-none font-black text-orange-600">
            <button onclick="handleAuth('register')" class="w-full bg-zinc-900 text-white py-6 rounded-3xl font-black shadow-xl">S'INSCRIRE</button>
            <p onclick="showPage('login-page')" class="text-center text-sm font-bold text-gray-500 mt-6 cursor-pointer">Déjà un compte ? Connexion</p>
        </div>
    </div>

    <div id="login-page" class="page px-8 pt-20">
        <h2 class="text-3xl font-black text-center mb-10">CONNEXION</h2>
        <div class="space-y-5">
            <div class="bg-gray-50 rounded-3xl p-5 border flex items-center">
                <select id="login-country" class="country-select mr-2">
                    <option value="+226">+226</option><option value="+228">+228</option>
                </select>
                <input id="login-phone" type="tel" placeholder="Téléphone" class="bg-transparent outline-none flex-1 font-bold">
            </div>
            <input id="login-pass" type="password" placeholder="Mot de passe" class="w-full p-5 bg-gray-50 rounded-3xl border outline-none font-bold">
            <button onclick="handleAuth('login')" class="w-full bg-zinc-900 text-white py-6 rounded-3xl font-black shadow-2xl">ACCÉDER</button>
            <p onclick="showPage('register-page')" class="text-center text-sm font-bold text-gray-500 mt-6 cursor-pointer">Créer un compte</p>
        </div>
    </div>

    <div id="home-page" class="page">
        <div class="bg-zinc-900 p-8 text-white">
            <h1 class="text-3xl font-black">Tableau de bord</h1>
            <div class="mt-6 bg-white/10 p-6 rounded-[30px]">
                <p class="text-[10px] opacity-60 uppercase font-bold">Solde Disponible</p>
                <h2 class="text-4xl font-black text-orange-500"><span class="solde-val">0</span> FCFA</h2>
            </div>
        </div>
        <div class="grid grid-cols-4 gap-2 p-6 text-center text-[9px] font-black uppercase">
            <div onclick="window.location.href='#'" class="cursor-pointer"><div class="bg-gray-100 p-4 rounded-full mb-1 mx-auto w-14 h-14 flex items-center justify-center"><i class="fas fa-plus"></i></div> Dépôt</div>
            <div onclick="showPage('retrait-page')" class="cursor-pointer"><div class="bg-gray-100 p-4 rounded-full mb-1 mx-auto w-14 h-14 flex items-center justify-center"><i class="fas fa-arrow-down"></i></div> Retrait</div>
            <div onclick="window.open('https://t.me/+ONx7pIapuKxhNWU8')" class="cursor-pointer"><div class="bg-gray-100 p-4 rounded-full mb-1 mx-auto w-14 h-14 flex items-center justify-center"><i class="fab fa-telegram-plane"></i></div> Support</div>
            <div onclick="doPointage()" class="cursor-pointer"><div class="bg-gray-100 p-4 rounded-full mb-1 mx-auto w-14 h-14 flex items-center justify-center"><i class="fas fa-check"></i></div> Pointage</div>
        </div>
    </div>

    <div id="produit-page" class="page p-6">
        <h2 class="text-2xl font-black mb-6 uppercase">Catalogue</h2>
        <div id="product-list" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div id="retrait-page" class="page">
        <div class="p-8 bg-blue-50 text-center">
            <div class="flex items-center mb-6" onclick="showPage('home-page')"><i class="fas fa-arrow-left"></i></div>
            <p class="font-bold text-gray-400 uppercase text-xs mb-2">Montant du retrait</p>
            <input id="draw-amount" type="number" placeholder="Min 1000" class="w-full p-4 rounded-2xl border-none text-center font-black text-xl outline-none">
        </div>
        <div class="p-8">
            <div onclick="showPage('lier-banque-page')" class="bg-gray-50 p-5 rounded-2xl flex justify-between items-center cursor-pointer mb-6">
                <span id="selected-bank-display" class="font-bold text-gray-400">Ajouter une méthode</span>
                <i class="fas fa-chevron-right text-gray-300"></i>
            </div>
            <button onclick="finalRetrait()" class="w-full bg-black text-white py-5 rounded-full font-black">CONFIRMER LE RETRAIT</button>
        </div>
    </div>

    <div id="lier-banque-page" class="page bg-[#2c3e50] min-h-screen p-8 text-white">
        <h2 class="text-xl font-black mb-8">CONFIGURER LA CARTE</h2>
        <div class="space-y-6">
            <div class="bank-input-group">
                <label>Banque</label>
                <select id="bank-name" class="text-white bg-transparent">
                    <option value="Orange Money" style="color:black">Orange Money</option>
                    <option value="Moov Money" style="color:black">Moov Money</option>
                </select>
            </div>
            <div class="bank-input-group"><label>Nom Complet</label><input id="bank-user" type="text" placeholder="Nom du titulaire"></div>
            <div class="bank-input-group"><label>Numéro de compte</label><input id="bank-number" type="tel" placeholder="00 00 00 00"></div>
            <button onclick="saveBankInfo()" class="w-full bg-white text-zinc-900 py-4 rounded-full font-black">ENREGISTRER</button>
        </div>
    </div>

    <nav id="main-nav" class="fixed bottom-0 w-full max-w-md bg-white border-t flex justify-around py-4 hidden z-50">
        <button onclick="showPage('home-page')" class="flex flex-col items-center"><i class="fas fa-home"></i><span class="text-[9px] font-bold">Accueil</span></button>
        <button onclick="showPage('produit-page')" class="flex flex-col items-center"><i class="fas fa-shopping-bag"></i><span class="text-[9px] font-bold">Produit</span></button>
        <button onclick="showPage('retrait-page')" class="flex flex-col items-center"><i class="fas fa-wallet"></i><span class="text-[9px] font-bold">Portefeuille</span></button>
    </nav>

</div>

<script>
    const SUPABASE_URL = 'https://ciamfmmmznshnmmtxntf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpYW1mbW1tem5zaG5tbXR4bnRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDYwNjgsImV4cCI6MjA5MTIyMjA2OH0.er_YZ2Mg-fwwXLPkS20eli1hO8eCfd8DReOferSBw3M';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    const produits = [
        { id: 0, nom: "S0", prix: 0, gain: 200, img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400" },
        { id: 1, nom: "S1", prix: 10000, gain: 500, img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400" }
    ];

    async function handleAuth(type) {
        document.getElementById('loader').style.display = 'flex';
        const country = type === 'register' ? document.getElementById('reg-country').value : document.getElementById('login-country').value;
        const rawPhone = type === 'register' ? document.getElementById('reg-phone').value : document.getElementById('login-phone').value;
        const phone = country + rawPhone;
        const pass = type === 'register' ? document.getElementById('reg-pass').value : document.getElementById('login-pass').value;

        if (type === 'register') {
            const { data: existing } = await _supabase.from('utilisateurs').select('numero').eq('numero', phone).single();
            if (existing) { document.getElementById('loader').style.display = 'none'; return alert("Numéro déjà utilisé !"); }

            const newUser = {
                numero: phone, pin: pass, solde: 500, invite_code: Math.random().toString(36).substring(7).toUpperCase(),
                bankInfo: {}, logs: [], orders: [], team: {l1:[], l2:[], l3:[]}, s0Used: false
            };

            const { error } = await _supabase.from('utilisateurs').insert([newUser]);
            document.getElementById('loader').style.display = 'none';
            if (error) return alert("Erreur: " + error.message);
            alert("Compte créé !");
            showPage('login-page');
        } else {
            const { data, error } = await _supabase.from('utilisateurs').select('*').eq('numero', phone).eq('pin', pass).single();
            document.getElementById('loader').style.display = 'none';
            if (error || !data) return alert("Identifiants incorrects");
            currentUser = data;
            startApp();
        }
    }

    function startApp() {
        document.getElementById('main-nav').classList.remove('hidden');
        updateUI();
        initProducts();
        showPage('home-page');
    }

    function updateUI() {
        if (!currentUser) return;
        document.querySelectorAll('.solde-val').forEach(el => el.innerText = currentUser.solde.toLocaleString());
        if (currentUser.bankInfo?.number) {
            document.getElementById('selected-bank-display').innerText = currentUser.bankInfo.name + " (" + currentUser.bankInfo.number + ")";
            document.getElementById('selected-bank-display').classList.remove('text-gray-400');
        }
    }

    async function saveToDB() {
        await _supabase.from('utilisateurs').update({
            solde: currentUser.solde, bankInfo: currentUser.bankInfo,
            logs: currentUser.logs, orders: currentUser.orders, s0Used: currentUser.s0Used
        }).eq('numero', currentUser.numero);
        updateUI();
    }

    function initProducts() {
        const container = document.getElementById('product-list');
        container.innerHTML = "";
        produits.forEach(p => {
            container.innerHTML += `
                <div class="product-card-dior p-4">
                    <img src="${p.img}" class="w-full h-32 object-cover rounded-xl mb-3">
                    <h4 class="font-black">${p.nom}</h4>
                    <p class="text-[10px] text-gray-400">${p.gain} F / Jour</p>
                    <div class="flex justify-between items-center mt-3">
                        <span class="font-bold text-xs">${p.prix} F</span>
                        <button onclick="acheter(${p.id})" class="bg-black text-white px-3 py-1 rounded-lg text-[9px]">INVESTIR</button>
                    </div>
                </div>`;
        });
    }

    function acheter(id) {
        const p = produits.find(x => x.id === id);
        if (currentUser.solde < p.prix) return alert("Solde insuffisant");
        currentUser.solde -= p.prix;
        currentUser.orders.push({ id: p.id, date: new Date().toLocaleString() });
        if (p.id === 0) currentUser.s0Used = true;
        saveToDB();
        alert("Succès !");
    }

    function saveBankInfo() {
        currentUser.bankInfo = {
            name: document.getElementById('bank-name').value,
            owner: document.getElementById('bank-user').value,
            number: document.getElementById('bank-number').value
        };
        saveToDB();
        showPage('retrait-page');
    }

    function doPointage() {
        const today = new Date().toDateString();
        if (currentUser.lastPointage === today) return alert("Déjà fait aujourd'hui !");
        currentUser.solde += 50;
        currentUser.lastPointage = today;
        saveToDB();
        alert("+50 F offert !");
    }

    function finalRetrait() {
        const amt = parseInt(document.getElementById('draw-amount').value);
        if (amt < 1000 || amt > currentUser.solde) return alert("Montant invalide");
        if (!currentUser.bankInfo?.number) return alert("Ajoutez une banque d'abord");
        currentUser.solde -= amt;
        currentUser.logs.push({ type: 'RETRAIT', amount: -amt, date: new Date().toLocaleString() });
        saveToDB();
        alert("Demande de retrait envoyée !");
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }
</script>

</body>
</html>
