<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DIOR 2026 - PANEL ADMIN</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-900 text-white p-6">
    <h1 class="text-2xl font-black mb-6 text-orange-500">ADMINISTRATION DIOR 2026</h1>
    
    <div id="stats" class="grid grid-cols-2 gap-4 mb-8">
        <div class="bg-zinc-800 p-4 rounded-xl">
            <p class="text-xs text-gray-400">TOTAL MEMBRES</p>
            <h2 id="total-users" class="text-xl font-bold">...</h2>
        </div>
    </div>

    <div class="space-y-4" id="user-list">
        <p>Chargement des membres...</p>
    </div>

    <script>
        // Tes identifiants récupérés de tes captures d'écran
        const SUPABASE_URL = 'https://ciamfmmmznshnmmtxntf.supabase.co';
        const SUPABASE_KEY = 'TON_API_KEY_ANON'; // Trouve la "anon public" key dans tes settings API
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadUsers() {
            const { data, error } = await supabase
                .from('utilisateurs')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) return alert("Erreur: " + error.message);

            const container = document.getElementById('user-list');
            container.innerHTML = "";
            document.getElementById('total-users').innerText = data.length;

            data.forEach(user => {
                container.innerHTML += `
                    <div class="bg-zinc-800 p-5 rounded-2xl border border-zinc-700">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="font-bold text-lg">${user.phone}</p>
                                <p class="text-xs text-gray-500 italic">Code: ${user.invite_code}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-orange-500 font-black">${user.balance} FCFA</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editBalance('${user.phone}', ${user.balance})" class="bg-white text-black text-[10px] font-black px-4 py-2 rounded-lg uppercase">Modifier Solde</button>
                            <button onclick="deleteUser('${user.phone}')" class="bg-red-600 text-white text-[10px] font-black px-4 py-2 rounded-lg uppercase">Bannir</button>
                        </div>
                    </div>
                `;
            });
        }

        async function editBalance(phone, oldBalance) {
            const amount = prompt(`Ajouter ou retirer du solde pour ${phone} :`, oldBalance);
            if (amount !== null) {
                const { error } = await supabase
                    .from('utilisateurs')
                    .update({ balance: parseFloat(amount) })
                    .eq('phone', phone);
                
                if (error) alert(error.message);
                else loadUsers();
            }
        }

        async function deleteUser(phone) {
            if(confirm("Supprimer définitivement ce membre ?")) {
                await supabase.from('utilisateurs').delete().eq('phone', phone);
                loadUsers();
            }
        }

        loadUsers();
    </script>
</body>
</html>
