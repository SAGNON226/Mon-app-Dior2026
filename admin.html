<div id="admin-panel" class="page p-6 bg-zinc-50 min-h-screen">
    <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            <div onclick="showPage('profil-page')" class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100">
                <i class="fas fa-arrow-left text-zinc-900"></i>
            </div>
            <h2 class="font-black uppercase text-xl tracking-tighter">Gestion <span class="text-red-600">Admin</span></h2>
        </div>
        <div class="bg-red-600 text-white text-[10px] font-bold px-3 py-1 rounded-full animate-pulse">LIVE CONTROL</div>
    </div>

    <div class="bg-zinc-900 p-6 rounded-[35px] shadow-2xl mb-8">
        <p class="text-[10px] font-black text-gray-400 mb-3 uppercase tracking-widest">Rechercher un membre</p>
        <div class="flex gap-2">
            <input id="search-phone" type="tel" placeholder="Numéro (ex: +226...)" 
                   class="flex-1 bg-white/10 p-4 rounded-2xl outline-none text-white font-bold border border-white/10 focus:border-red-500 transition-all">
            <button onclick="adminSearchUser()" class="bg-red-600 text-white px-6 rounded-2xl hover:bg-red-700 transition-colors">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </div>

    <div id="admin-result" class="hidden">
        <div class="bg-white p-8 rounded-[40px] shadow-xl border border-gray-100 relative overflow-hidden">
            <div class="absolute top-0 right-0 bg-red-50 px-4 py-2 rounded-bl-2xl">
                <span id="res-status-badge" class="text-[9px] font-black uppercase text-red-600">Statut: ---</span>
            </div>

            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-zinc-100 rounded-2xl flex items-center justify-center mx-auto mb-3">
                    <i class="fas fa-user text-2xl text-zinc-400"></i>
                </div>
                <h3 id="res-phone" class="font-black text-xl text-zinc-900 tracking-tight">---</h3>
                <p id="res-id" class="text-[8px] text-gray-300 font-mono mt-1">ID: ---</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="text-[11px] font-black uppercase text-gray-400 ml-1">Solde actuel (FCFA)</label>
                    <div class="relative mt-1">
                        <input id="res-balance" type="number" 
                               class="w-full p-4 bg-gray-50 rounded-2xl border-none font-black text-2xl text-green-600 focus:ring-2 ring-green-500">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 font-black text-gray-300">FCFA</span>
                    </div>
                </div>

                <div>
                    <label class="text-[11px] font-black uppercase text-gray-400 ml-1">Grade VIP</label>
                    <select id="res-vip" class="w-full p-4 bg-gray-50 rounded-2xl border-none font-black text-zinc-900 mt-1 appearance-none">
                        <option value="S0">S0 - Gratuit</option>
                        <option value="S1">S1 - 10 000 F</option>
                        <option value="S2">S2 - 30 000 F</option>
                        <option value="S3">S3 - 70 000 F</option>
                        <option value="S4">S4 - 140 000 F</option>
                        <option value="S5">S5 - 280 000 F</option>
                        <option value="S6">S6 - 500 000 F</option>
                        <option value="S7">S7 - 800 000 F</option>
                        <option value="S8">S8 - 1 200 000 F</option>
                        <option value="S9">S9 - 2 000 000 F</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-4">
                    <button onclick="adminUpdateUser('active')" 
                            class="bg-zinc-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg active:scale-95 transition-transform">
                        Enregistrer
                    </button>
                    <button id="btn-ban" onclick="adminHandleBan()" 
                            class="bg-red-50 text-red-600 py-4 rounded-2xl font-black text-[10px] uppercase border border-red-100 active:scale-95 transition-transform">
                        Bannir l'utilisateur
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * LOGIQUE ADMIN SUPABASE
 */
let targetUserData = null; 

// 1. Rechercher un utilisateur
async function adminSearchUser() {
    const phone = document.getElementById('search-phone').value.trim();
    if(!phone) return alert("Veuillez saisir un numéro complet");

    // Loader (Optionnel)
    document.getElementById('loader').style.display = 'flex';

    const { data, error } = await supabase
        .from('utilisateurs')
        .select('*')
        .eq('phone_number', phone)
        .single();

    document.getElementById('loader').style.display = 'none';

    if (error || !data) {
        alert("Utilisateur introuvable dans la base de données");
        document.getElementById('admin-result').classList.add('hidden');
        return;
    }

    // Remplissage des données
    targetUserData = data;
    document.getElementById('admin-result').classList.remove('hidden');
    document.getElementById('res-phone').innerText = data.phone_number;
    document.getElementById('res-id').innerText = "ID: " + data.id;
    document.getElementById('res-balance').value = data.balance;
    document.getElementById('res-vip').value = data.s_value || "S0";
    document.getElementById('res-status-badge').innerText = "Statut: " + data.status;
    
    // Bouton de ban
    const banBtn = document.getElementById('btn-ban');
    if(data.status === 'banned') {
        banBtn.innerText = "Débannir l'utilisateur";
        banBtn.className = "bg-green-50 text-green-600 py-4 rounded-2xl font-black text-[10px] uppercase border border-green-100";
    } else {
        banBtn.innerText = "Bannir l'utilisateur";
        banBtn.className = "bg-red-50 text-red-600 py-4 rounded-2xl font-black text-[10px] uppercase border border-red-100";
    }
}

// 2. Mettre à jour (Solde et VIP)
async function adminUpdateUser(statusOverride) {
    if(!targetUserData) return;

    const newBalance = parseFloat(document.getElementById('res-balance').value);
    const newVip = document.getElementById('res-vip').value;

    const { error } = await supabase
        .from('utilisateurs')
        .update({ 
            balance: newBalance,
            s_value: newVip,
            status: statusOverride || targetUserData.status
        })
        .eq('id', targetUserData.id);

    if (error) {
        alert("Erreur lors de la mise à jour: " + error.message);
    } else {
        alert("Succès ! Les données de " + targetUserData.phone_number + " ont été modifiées.");
        adminSearchUser(); // Rafraîchir l'interface
    }
}

// 3. Gérer le Bannissement
function adminHandleBan() {
    const isCurrentlyBanned = targetUserData.status === 'banned';
    const nextStatus = isCurrentlyBanned ? 'active' : 'banned';
    
    if(confirm(`Voulez-vous vraiment ${isCurrentlyBanned ? 'débannir' : 'bannir'} ce membre ?`)) {
        adminUpdateUser(nextStatus);
    }
}

// 4. Protection de l'accès (À appeler lors du login)
function checkAdminAccess() {
    // Supposons que tu as stocké le rôle dans currentUser lors de la connexion
    if(currentUser && currentUser.role === 'admin') {
        // Tu peux faire apparaître un bouton vers le panel admin ici
        console.log("Accès Admin Autorisé");
    } else {
        // Rediriger ou cacher si pas admin
        showPage('home-page');
    }
}
</script>
