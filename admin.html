<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIOR 2026 - ADMIN CORRIGÉ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-black text-white p-6">
    <h1 class="text-orange-500 font-black text-2xl mb-6">ADMIN DIOR 2026</h1>
    
    <div id="user-list" class="space-y-4">
        <p class="text-zinc-500">Chargement des données réelles...</p>
    </div>

    <script>
        const SUPABASE_URL = 'https://ciamfmmmznshnmmtxntf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpYW1mbW1tem5zaG5tbXR4bnRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDYwNjgsImV4cCI6MjA5MTIyMjA2OH0.er_YZ2Mg-fwwXLPkS20eli1hO8eCfd8DReOferSBw3M';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadUsers() {
            const listDiv = document.getElementById('user-list');
            
            // On récupère tes colonnes actuelles : numero, solde, pin
            const { data, error } = await _supabase
                .from('utilisateurs')
                .select('id, numero, solde, pin, created_at')
                .order('created_at', { ascending: false });

            if (error) {
                listDiv.innerHTML = `<p class="text-red-500 italic">Erreur : ${error.message}</p>`;
                return;
            }

            listDiv.innerHTML = "";
            data.forEach(user => {
                // Si le numéro est vide dans la base, on affiche "Inconnu"
                const displayPhone = user.numero || "Numéro Vide";
                
                listDiv.innerHTML += `
                    <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-orange-500 font-bold text-lg">${displayPhone}</p>
                                <p class="text-[10px] text-zinc-500">PIN: ${user.pin || 'Non défini'}</p>
                                <p class="text-[9px] text-zinc-600 italic">Inscrit le: ${new Date(user.created_at).toLocaleDateString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-white font-black text-xl">${user.solde || 0} F</p>
                                <span class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest">Solde Actuel</span>
                            </div>
                        </div>
                        <div class="mt-4 flex gap-2">
                            <button onclick="changeBalance('${user.numero}', ${user.solde})" class="flex-1 bg-white text-black font-black py-2 rounded-xl text-xs uppercase">Modifier Solde</button>
                            <button onclick="deleteUser(${user.id})" class="bg-zinc-800 text-red-500 px-4 py-2 rounded-xl text-xs"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        async function changeBalance(numero, currentSolde) {
            const newSolde = prompt(`Nouveau solde pour ${numero} :`, currentSolde);
            if (newSolde !== null) {
                const { error } = await _supabase
                    .from('utilisateurs')
                    .update({ solde: parseInt(newSolde) })
                    .eq('numero', numero);
                
                if (error) alert(error.message);
                else loadUsers();
            }
        }

        async function deleteUser(id) {
            if(confirm("Supprimer ce membre ?")) {
                await _supabase.from('utilisateurs').delete().eq('id', id);
                loadUsers();
            }
        }

        loadUsers();
    </script>
</body>
</html>
