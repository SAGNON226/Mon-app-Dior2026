<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIOR 2026 - PANEL BOSS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-black text-white p-4">
    <div class="mb-8">
        <h1 class="text-orange-500 font-black text-2xl tracking-tighter italic">ADMIN DIOR 2026</h1>
        <p class="text-[10px] text-zinc-500 uppercase font-bold">Gestion des investisseurs</p>
    </div>
    
    <div id="user-list" class="space-y-4">
        </div>

    <script>
        const SUPABASE_URL = 'https://ciamfmmmznshnmmtxntf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpYW1mbW1tem5zaG5tbXR4bnRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDYwNjgsImV4cCI6MjA5MTIyMjA2OH0.er_YZ2Mg-fwwXLPkS20eli1hO8eCfd8DReOferSBw3M';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadUsers() {
            const listDiv = document.getElementById('user-list');
            
            // On récupère tes colonnes : numero, solde, pin, id
            const { data, error } = await _supabase
                .from('utilisateurs')
                .select('id, numero, solde, pin')
                .order('id', { ascending: false });

            if (error) {
                listDiv.innerHTML = `<p class="text-red-500 uppercase text-[10px] font-bold">Erreur : ${error.message}</p>`;
                return;
            }

            listDiv.innerHTML = "";
            data.forEach(user => {
                // On utilise la colonne "numero" pour l'affichage
                const numClient = user.numero || "SANS NUMÉRO";
                
                listDiv.innerHTML += `
                    <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-[25px]">
                        <div class="flex justify-between items-start">
                            <div>
                                <h2 class="text-orange-500 font-black text-xl">${numClient}</h2>
                                <p class="text-[10px] text-zinc-500 font-bold uppercase">PIN: ${user.pin || '0000'}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-white font-black text-xl">${user.solde || 0} F</p>
                                <p class="text-[9px] text-zinc-600 font-bold uppercase">Solde</p>
                            </div>
                        </div>
                        <div class="mt-4 flex gap-2">
                            <button onclick="changeBalance('${user.numero}', ${user.solde})" class="flex-1 bg-white text-black font-black py-3 rounded-2xl text-[10px] uppercase">Modifier Solde</button>
                            <button onclick="deleteUser(${user.id})" class="bg-zinc-800 text-red-600 px-5 rounded-2xl"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        async function changeBalance(numero, oldSolde) {
            const amount = prompt(`Nouveau solde pour le client ${numero} :`, oldSolde);
            if (amount !== null) {
                const { error } = await _supabase
                    .from('utilisateurs')
                    .update({ solde: parseInt(amount) })
                    .eq('numero', numero);
                
                if (error) alert("Erreur : " + error.message);
                else loadUsers();
            }
        }

        async function deleteUser(id) {
            if(confirm("Supprimer définitivement ce compte ?")) {
                await _supabase.from('utilisateurs').delete().eq('id', id);
                loadUsers();
            }
        }

        loadUsers();
    </script>
</body>
</html>
