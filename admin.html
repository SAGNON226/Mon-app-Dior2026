<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Dior2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <div id="admin-auth" class="fixed inset-0 bg-zinc-900 z-[1000] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl text-center">
            <h1 class="text-2xl font-black mb-6">ADMIN <span class="text-orange-500">DIOR2026</span></h1>
            <input id="admin-pass" type="password" placeholder="Code d'accès admin" class="w-full p-4 bg-gray-100 rounded-2xl mb-4 outline-none border-2 focus:border-orange-500 font-bold">
            <button onclick="checkAdminAuth()" class="w-full bg-black text-white py-4 rounded-2xl font-black">ACCÉDER AU PANEL</button>
        </div>
    </div>

    <header class="bg-white p-6 shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h2 class="font-black text-xl tracking-tighter">PANEL <span class="text-orange-500">ADMIN</span></h2>
            <button onclick="loadUsers()" class="bg-gray-100 p-3 rounded-xl"><i class="fas fa-sync-alt"></i></button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-zinc-900 p-6 rounded-[30px] text-white">
                <p class="text-[10px] opacity-60 font-bold uppercase mb-1">Total Utilisateurs</p>
                <h3 id="stat-total" class="text-3xl font-black">0</h3>
            </div>
            <div class="bg-orange-500 p-6 rounded-[30px] text-white">
                <p class="text-[10px] opacity-60 font-bold uppercase mb-1">Membres Actifs</p>
                <h3 id="stat-actifs" class="text-3xl font-black">0</h3>
            </div>
        </div>

        <h3 class="font-black text-gray-400 text-xs uppercase mb-4 tracking-widest">Gestion des Comptes</h3>
        <div id="users-container" class="space-y-4">
            <p class="text-center py-10 text-gray-400">Chargement des données...</p>
        </div>
    </main>

    <script>
        const _URL = "https://ciamfmmmznshnmmtxntf.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpYW1mbW1tem5zaG5tbXR4bnRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDYwNjgsImV4cCI6MjA5MTIyMjA2OH0.er_YZ2Mg-fwwXLPkS20eli1hO8eCfd8DReOferSBw3M";
        const supabaseAdmin = supabase.createClient(_URL, _KEY);

        // Sécurité simple
        function checkAdminAuth() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === "ADMIN1234") { // CHANGE CE MOT DE PASSE ICI
                document.getElementById('admin-auth').style.display = 'none';
                loadUsers();
            } else {
                alert("Accès refusé");
            }
        }

        async function loadUsers() {
            const container = document.getElementById('users-container');
            container.innerHTML = '<p class="text-center py-10">Mise à jour...</p>';

            const { data: users, error } = await supabaseAdmin.from('utilisateurs').select('*');

            if(error) return alert("Erreur: " + error.message);

            document.getElementById('stat-total').innerText = users.length;
            document.getElementById('stat-actifs').innerText = users.filter(u => u.statut === 'actif').length;

            container.innerHTML = "";
            users.forEach(user => {
                const isBanned = user.statut === 'banni';
                const isVIP = user.role === 'vip';

                container.innerHTML += `
                    <div class="bg-white p-6 rounded-[30px] shadow-sm border ${isBanned ? 'opacity-50 border-red-200' : 'border-gray-100'}">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-black text-lg">${user.phone_number_code}</h4>
                                <p class="text-[10px] font-bold uppercase ${isVIP ? 'text-orange-500' : 'text-gray-400'}">
                                    Rôle: ${user.role} | Statut: ${user.statut}
                                </p>
                            </div>
                            <div class="text-right font-black text-green-600">
                                ${user.balance.toLocaleString()} F
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="updateBalance('${user.phone_number_code}')" class="bg-gray-100 p-3 rounded-xl text-[10px] font-black uppercase">💰 Modifier Solde</button>
                            
                            <button onclick="toggleRole('${user.phone_number_code}', '${user.role}')" class="${isVIP ? 'bg-orange-100 text-orange-600' : 'bg-zinc-900 text-white'} p-3 rounded-xl text-[10px] font-black uppercase">
                                ${isVIP ? 'Retirer VIP' : 'Passer VIP'}
                            </button>

                            <button onclick="toggleBan('${user.phone_number_code}', '${user.statut}')" class="${isBanned ? 'bg-green-500' : 'bg-red-500'} text-white p-3 rounded-xl text-[10px] font-black uppercase col-span-2 mt-2">
                                ${isBanned ? '✅ Débloquer le compte' : '🚫 Bannir l\'utilisateur'}
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // Action : Changer le solde
        async function updateBalance(phone) {
            const newAmount = prompt("Entrez le nouveau solde total :");
            if (newAmount === null) return;

            const { error } = await supabaseAdmin
                .from('utilisateurs')
                .update({ balance: parseInt(newAmount) })
                .eq('phone_number_code', phone);

            if(!error) loadUsers();
        }

        // Action : VIP / Membre
        async function toggleRole(phone, currentRole) {
            const newRole = currentRole === 'membre' ? 'vip' : 'membre';
            const { error } = await supabaseAdmin
                .from('utilisateurs')
                .update({ role: newRole })
                .eq('phone_number_code', phone);

            if(!error) loadUsers();
        }

        // Action : Bannir / Activer
        async function toggleBan(phone, currentStatus) {
            const newStatus = currentStatus === 'actif' ? 'banni' : 'actif';
            const confirmAction = confirm(`Voulez-vous vraiment changer le statut en : ${newStatus} ?`);
            
            if(confirmAction) {
                const { error } = await supabaseAdmin
                    .from('utilisateurs')
                    .update({ statut: newStatus })
                    .eq('phone_number_code', phone);

                if(!error) loadUsers();
            }
        }
    </script>
</body>
</html>
